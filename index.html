<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro - تيليبرومبتر احترافي</title>
    
    <!-- تحميل خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- تحميل مكتبة Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- تحميل مكتبة React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- تحميل Babel لتشغيل كود React داخل المتصفح مباشرة -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }

        /* 3D Button Effects for Intro */
        .btn-3d {
          transition: all 0.1s;
          box-shadow: 0px 10px 0px 0px rgba(0,0,0,0.5), 0px 15px 20px 0px rgba(0,0,0,0.4);
          transform: translateY(0);
        }
        .btn-3d:active {
          transform: translateY(10px);
          box-shadow: 0px 0px 0px 0px rgba(0,0,0,0.5), 0px 5px 10px 0px rgba(0,0,0,0.4);
        }

        .animated-bg {
          background: linear-gradient(-45deg, #0f172a, #1e1b4b, #000000, #172554);
          background-size: 400% 400%;
          animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // إضافة useLayoutEffect للتحكم في مقاس الـ textarea ديناميكياً
        const { useState, useEffect, useLayoutEffect, useRef, useCallback } = React;

        // --- الأيقونات (Icons) ---
        const IconPlay = ({ size=24, fill="none", className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconPause = ({ size=24, fill="none", className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const IconSettings = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconMonitorPlay = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line><polygon points="10 7 15 10 10 13 10 7"></polygon></svg>;
        const IconType = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>;
        const IconAlignLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="15" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconAlignCenter = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="6" x2="21" y2="6"></line><line x1="6" y1="12" x2="18" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconAlignRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="6" x2="21" y2="6"></line><line x1="9" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconRefreshCcw = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>;
        const IconFlipVertical = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="8 21 12 17 16 21"></polyline><polyline points="8 3 12 7 16 3"></polyline><line x1="12" y1="2" x2="12" y2="22"></line></svg>;
        const IconPalette = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>;
        const IconArrowLeftRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="8 16 4 12 8 8"></polyline><line x1="4" y1="12" x2="20" y2="12"></line><polyline points="16 8 20 12 16 16"></polyline></svg>;
        const IconCrosshair = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>;

        // Custom Hook to manage Local Storage
        function useStickyState(defaultValue, key) {
          const [value, setValue] = useState(() => {
            const stickyValue = window.localStorage.getItem(key);
            return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
          });

          useEffect(() => {
            window.localStorage.setItem(key, JSON.stringify(value));
          }, [key, value]);

          return [value, setValue];
        }

        function App() {
          // Application State
          const [appStage, setAppStage] = useState('intro'); // 'intro', 'editor', 'prompter'
          const [language, setLanguage] = useState('ar');

          // Text and Settings State (Saved in LocalStorage)
          const [text, setText] = useStickyState('أهلاً بك في تطبيق التيليبرومبتر الاحترافي.\nاكتب نصك هنا...', 'teleprompter_text');
          const [settings, setSettings] = useStickyState({
            fontFamily: 'Tajawal, sans-serif',
            fontSize: 64,
            lineHeight: 1.5,
            textAlign: 'center',
            bgColor: '#000000',
            textColor: '#ffffff',
            speed: 30,
            mirror: false, // Horizontal flip
            flip: false,   // Vertical flip
            textWidth: 100, // Text width percentage (30-100)
            showGuide: false, // Reading Guide visibility
            guidePosition: 30, // Position of guide from top (5-95%)
          }, 'teleprompter_settings');

          // Helper to update specific setting
          const updateSetting = (key, value) => {
            setSettings(prev => ({ ...prev, [key]: value }));
          };

          const handleLanguageSelect = (lang) => {
            setLanguage(lang);
            setAppStage('editor');
            // Set default alignment based on language
            if (lang === 'ar') updateSetting('textAlign', 'right');
            else updateSetting('textAlign', 'left');
          };

          return (
            <div className={`min-h-screen bg-gray-900 text-white selection:bg-blue-500 selection:text-white ${language === 'ar' ? 'dir-rtl' : 'dir-ltr'}`} style={{ direction: language === 'ar' ? 'rtl' : 'ltr' }}>
              {appStage === 'intro' && <IntroScreen onSelect={handleLanguageSelect} />}
              {appStage === 'editor' && <EditorScreen text={text} setText={setText} settings={settings} updateSetting={updateSetting} onStart={() => setAppStage('prompter')} language={language} />}
              {/* قمنا بتمرير setText إلى PrompterScreen ليتمكن من التعديل المباشر */}
              {appStage === 'prompter' && <PrompterScreen text={text} setText={setText} settings={settings} onExit={() => setAppStage('editor')} updateSetting={updateSetting} />}
            </div>
          );
        }

        // --- INTRO SCREEN COMPONENT ---
        function IntroScreen({ onSelect }) {
          return (
            <div className="animated-bg min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
              <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-50 animate-blob"></div>
              <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-50 animate-blob animation-delay-2000"></div>

              <div className="z-10 text-center mb-16">
                <IconMonitorPlay size={80} className="mx-auto mb-6 text-white opacity-90 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]" />
                <h1 className="text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 drop-shadow-lg" style={{fontFamily: 'Tajawal'}}>
                  Teleprompter Pro
                </h1>
                <p className="text-xl text-gray-300 font-light tracking-wide">اختر لغة الواجهة | Choose Interface Language</p>
              </div>

              <div className="flex flex-col md:flex-row gap-8 z-10">
                <button 
                  onClick={() => onSelect('ar')}
                  className="btn-3d relative group bg-gradient-to-br from-indigo-600 to-blue-800 border border-blue-400/30 p-10 rounded-3xl w-72 flex flex-col items-center justify-center overflow-hidden cursor-pointer"
                >
                  <div className="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                  <span className="text-5xl font-bold text-white mb-2" style={{fontFamily: 'Tajawal'}}>العربية</span>
                  <span className="text-blue-200">من اليمين لليسار</span>
                </button>

                <button 
                  onClick={() => onSelect('en')}
                  className="btn-3d relative group bg-gradient-to-br from-gray-700 to-gray-900 border border-gray-500/30 p-10 rounded-3xl w-72 flex flex-col items-center justify-center overflow-hidden cursor-pointer"
                >
                  <div className="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                  <span className="text-5xl font-bold text-white mb-2 font-sans">English</span>
                  <span className="text-gray-300">Left to Right</span>
                </button>
              </div>
            </div>
          );
        }

        // --- EDITOR SCREEN COMPONENT ---
        function EditorScreen({ text, setText, settings, updateSetting, onStart, language }) {
          const isAr = language === 'ar';
          
          const fontOptions = [
            { name: 'Tajawal', value: 'Tajawal, sans-serif' },
            { name: 'Cairo', value: 'Cairo, sans-serif' },
            { name: 'Amiri', value: 'Amiri, serif' },
            { name: 'Arial', value: 'Arial, sans-serif' },
            { name: 'Times New Roman', value: '"Times New Roman", serif' },
          ];

          return (
            <div className="min-h-screen bg-gray-900 flex flex-col">
              <div className="bg-gray-800 border-b border-gray-700 p-4 shadow-xl sticky top-0 z-20">
                <div className="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
                  
                  <div className="flex flex-wrap items-center gap-4 bg-gray-900 p-2 rounded-xl border border-gray-700">
                    <div className="flex items-center gap-2">
                      <IconType size={18} className="text-gray-400" />
                      <select 
                        value={settings.fontFamily} 
                        onChange={(e) => updateSetting('fontFamily', e.target.value)}
                        className="bg-gray-800 text-white rounded p-1.5 border border-gray-600 focus:outline-none focus:border-blue-500"
                      >
                        {fontOptions.map(font => <option key={font.value} value={font.value}>{font.name}</option>)}
                      </select>
                    </div>

                    <div className="w-px h-6 bg-gray-700"></div>

                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-400">{isAr ? 'الحجم' : 'Size'}</span>
                      <input 
                        type="number" 
                        value={settings.fontSize} 
                        onChange={(e) => updateSetting('fontSize', Number(e.target.value))}
                        className="bg-gray-800 text-white rounded p-1.5 border border-gray-600 w-16 text-center focus:outline-none focus:border-blue-500"
                      />
                    </div>

                    <div className="w-px h-6 bg-gray-700"></div>

                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-400">{isAr ? 'التباعد' : 'Spacing'}</span>
                      <input 
                        type="number" 
                        step="0.1"
                        value={settings.lineHeight} 
                        onChange={(e) => updateSetting('lineHeight', Number(e.target.value))}
                        className="bg-gray-800 text-white rounded p-1.5 border border-gray-600 w-16 text-center focus:outline-none focus:border-blue-500"
                      />
                    </div>

                    <div className="w-px h-6 bg-gray-700"></div>

                    <div className="flex items-center gap-2" title={isAr ? 'تغيير عرض السطر لتقليل عدد الكلمات' : 'Change line width'}>
                      <IconArrowLeftRight size={16} className="text-gray-400" />
                      <input 
                        type="range" 
                        min="30"
                        max="100"
                        value={settings.textWidth ?? 100} 
                        onChange={(e) => updateSetting('textWidth', Number(e.target.value))}
                        className="w-20 accent-blue-500"
                      />
                    </div>

                    <div className="w-px h-6 bg-gray-700"></div>

                    <div className="flex bg-gray-800 rounded border border-gray-600 overflow-hidden">
                      <button onClick={() => updateSetting('textAlign', 'left')} className={`p-2 ${settings.textAlign === 'left' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}><IconAlignLeft size={16} /></button>
                      <button onClick={() => updateSetting('textAlign', 'center')} className={`p-2 ${settings.textAlign === 'center' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}><IconAlignCenter size={16} /></button>
                      <button onClick={() => updateSetting('textAlign', 'right')} className={`p-2 ${settings.textAlign === 'right' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}><IconAlignRight size={16} /></button>
                    </div>
                  </div>

                  <div className="flex items-center gap-4 bg-gray-900 p-2 rounded-xl border border-gray-700">
                    <IconPalette size={18} className="text-gray-400" />
                    <div className="flex items-center gap-2">
                      <label className="text-xs text-gray-400 cursor-pointer flex items-center gap-1">
                        {isAr ? 'الخلفية' : 'BG'}
                        <input type="color" value={settings.bgColor} onChange={(e) => updateSetting('bgColor', e.target.value)} className="w-6 h-6 p-0 border-0 rounded cursor-pointer" />
                      </label>
                    </div>
                    <div className="flex items-center gap-2">
                      <label className="text-xs text-gray-400 cursor-pointer flex items-center gap-1">
                        {isAr ? 'النص' : 'Text'}
                        <input type="color" value={settings.textColor} onChange={(e) => updateSetting('textColor', e.target.value)} className="w-6 h-6 p-0 border-0 rounded cursor-pointer" />
                      </label>
                    </div>
                  </div>

                  <button 
                    onClick={onStart}
                    className="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg transform transition hover:scale-105"
                  >
                    <IconPlay fill="currentColor" size={20} />
                    {isAr ? 'بدء العرض' : 'Start Prompter'}
                  </button>

                </div>
              </div>

              <div className="flex-1 w-full flex flex-col p-4 md:p-8 overflow-hidden">
                <div className="bg-gray-800 rounded-2xl border border-gray-700 shadow-2xl flex-1 flex flex-col overflow-y-auto">
                  <div className="flex-1 w-full mx-auto" style={{ width: `${settings.textWidth ?? 100}%`, transition: 'width 0.3s ease' }}>
                    <textarea
                      value={text}
                      onChange={(e) => setText(e.target.value)}
                      /* تم التعديل هنا: إزالة تحجيم الخط بـ 40 بيكسل ليكون مطابق تماما لشاشة العرض */
                      className="w-full h-full min-h-[500px] bg-transparent text-white px-4 py-8 md:px-8 resize-none focus:outline-none hide-scrollbar"
                      placeholder={isAr ? "ابدأ بكتابة النص هنا..." : "Start typing your script here..."}
                      style={{
                        fontFamily: settings.fontFamily,
                        fontSize: `${settings.fontSize}px`, // هنا التعديل الذي سيجعل التفاف الكلمات متطابق تماماً
                        lineHeight: settings.lineHeight,
                        textAlign: settings.textAlign,
                      }}
                    />
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // --- PROMPTER SCREEN COMPONENT ---
        function PrompterScreen({ text, setText, settings, onExit, updateSetting }) {
          const containerRef = useRef(null);
          const textRef = useRef(null);
          const requestRef = useRef(null);
          
          const [isPlaying, setIsPlaying] = useState(false);
          const [isMousePaused, setIsMousePaused] = useState(false);
          const [showControls, setShowControls] = useState(true);
          
          const isPlayingRef = useRef(isPlaying);
          const isMousePausedRef = useRef(isMousePaused);
          const speedRef = useRef(settings.speed);
          const speedMultiplierRef = useRef(1);
          const accumulateRef = useRef(0);

          useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
          useEffect(() => { isMousePausedRef.current = isMousePaused; }, [isMousePaused]);
          useEffect(() => { speedRef.current = settings.speed; }, [settings.speed]);

          const controlsTimeoutRef = useRef(null);

          // هذا الجزء خاص بتمدد مساحة النص تلقائياً بحسب محتواه
          useLayoutEffect(() => {
            if (textRef.current) {
              const container = containerRef.current;
              // الاحتفاظ بمكان الـ scroll كي لا تقفز الشاشة أثناء الكتابة
              const prevScrollTop = container ? container.scrollTop : 0;
              
              textRef.current.style.height = '0px';
              textRef.current.style.height = textRef.current.scrollHeight + 'px';
              
              if (container) {
                container.scrollTop = prevScrollTop;
              }
            }
          }, [text, settings.fontSize, settings.lineHeight, settings.textWidth, settings.fontFamily]);

          useEffect(() => {
            if (isPlaying) {
              setShowControls(false);
            } else {
              setShowControls(true);
              clearTimeout(controlsTimeoutRef.current);
            }
          }, [isPlaying]);

          const handleMouseMove = () => {
            if (isMousePausedRef.current) return;
            
            setShowControls(true);
            if (isPlayingRef.current) {
              clearTimeout(controlsTimeoutRef.current);
              controlsTimeoutRef.current = setTimeout(() => {
                if (isPlayingRef.current) setShowControls(false);
              }, 1500);
            }
          };

          const animate = useCallback((time) => {
            if (isPlayingRef.current && !isMousePausedRef.current && containerRef.current) {
              const scrollAmount = (speedRef.current / 15) * speedMultiplierRef.current;
              
              accumulateRef.current += scrollAmount;
              
              if (accumulateRef.current >= 1) {
                const pixels = Math.floor(accumulateRef.current);
                containerRef.current.scrollTop += pixels;
                accumulateRef.current -= pixels;
              }
            }
            requestRef.current = requestAnimationFrame(animate);
          }, []);

          useEffect(() => {
            requestRef.current = requestAnimationFrame(animate);
            return () => cancelAnimationFrame(requestRef.current);
          }, [animate]);

          useEffect(() => {
            const handleKeyDown = (e) => {
              // إذا ضغط المستخدم على زر Esc، نخرج من التعديل ليسهل استخدام زر المسطرة لاحقاً
              if (e.key === 'Escape') {
                if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') {
                  document.activeElement.blur();
                }
                return;
              }

              // السماح بالكتابة العادية دون تفعيل أزرار التحكم
              if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

              if (['Space', ' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
              }

              if (!containerRef.current) return;

              switch (e.key) {
                case 'Space':
                case ' ':
                  setIsPlaying(prev => !prev);
                  break;
                case 'ArrowUp':
                  containerRef.current.scrollTop -= 100;
                  accumulateRef.current = 0;
                  break;
                case 'ArrowRight':
                  containerRef.current.scrollTop -= 350;
                  accumulateRef.current = 0;
                  break;
                case 'ArrowDown':
                  speedMultiplierRef.current = 4;
                  break;
                case 'ArrowLeft':
                  speedMultiplierRef.current = 10;
                  break;
                default:
                  break;
              }
            };

            const handleKeyUp = (e) => {
              if (['ArrowDown', 'ArrowLeft'].includes(e.key)) {
                speedMultiplierRef.current = 1;
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            return () => {
              window.removeEventListener('keydown', handleKeyDown);
              window.removeEventListener('keyup', handleKeyUp);
            };
          }, []);

          const handleMouseDown = (e) => {
            if (e.target.closest('.controls-bar') || e.target.tagName === 'TEXTAREA') return;
            setIsMousePaused(true);
          };
          
          const handleMouseUp = () => {
            setIsMousePaused(false);
          };

          let transformStr = '';
          if (settings.mirror) transformStr += 'scaleX(-1) ';
          if (settings.flip) transformStr += 'scaleY(-1) ';

          return (
            <div 
              className="fixed inset-0 overflow-hidden"
              style={{ backgroundColor: settings.bgColor }}
              onMouseMove={handleMouseMove}
              onMouseDown={handleMouseDown}
              onMouseUp={handleMouseUp}
              onMouseLeave={handleMouseUp}
              onTouchStart={handleMouseDown}
              onTouchEnd={handleMouseUp}
            >
              
              <div 
                className={`controls-bar fixed top-0 left-0 right-0 p-4 flex flex-wrap justify-center md:justify-between items-center gap-4 z-50 transition-all duration-500 ${showControls ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-full'}`}
              >
                <div className="flex items-center gap-3 bg-gray-900/80 backdrop-blur border border-gray-700 p-2 rounded-xl shadow-2xl text-white">
                  <button 
                    onClick={onExit}
                    className="p-2 hover:bg-gray-700 rounded text-gray-300 hover:text-white"
                    title="رجوع / Exit"
                  >
                    <IconSettings size={24} />
                  </button>
                  <div className="w-px h-8 bg-gray-600"></div>
                  <button 
                    onClick={() => setIsPlaying(!isPlaying)}
                    className={`p-3 rounded-lg flex items-center gap-2 ${isPlaying ? 'bg-red-500/20 text-red-500 hover:bg-red-500/30' : 'bg-green-500/20 text-green-500 hover:bg-green-500/30'}`}
                  >
                    {isPlaying ? <IconPause fill="currentColor" /> : <IconPlay fill="currentColor" />}
                  </button>
                </div>

                <div className="flex items-center gap-4 bg-gray-900/80 backdrop-blur border border-gray-700 p-3 rounded-xl shadow-2xl text-white">
                  <span className="text-sm font-bold text-gray-300">السرعة / Speed</span>
                  <input 
                    type="range" 
                    min="1" 
                    max="100" 
                    value={settings.speed} 
                    onChange={(e) => updateSetting('speed', Number(e.target.value))}
                    className="w-32 md:w-48 accent-blue-500"
                  />
                  <input 
                    type="number" 
                    min="1" 
                    max="100"
                    value={settings.speed}
                    onChange={(e) => updateSetting('speed', Number(e.target.value))}
                    className="w-16 bg-gray-800 text-center rounded border border-gray-600 p-1 focus:outline-none focus:border-blue-500"
                  />
                </div>

                <div className="flex items-center gap-2 bg-gray-900/80 backdrop-blur border border-gray-700 p-2 rounded-xl shadow-2xl text-white">
                  <button 
                    onClick={() => updateSetting('showGuide', !settings.showGuide)}
                    className={`p-2 rounded flex flex-col items-center gap-1 ${settings.showGuide ? 'bg-red-600' : 'hover:bg-gray-700'}`}
                    title="مسطرة القراءة / Reading Guide"
                  >
                    <IconCrosshair size={20} />
                    <span className="text-[10px]">Guide</span>
                  </button>
                  {settings.showGuide && (
                    <input 
                      type="range" 
                      min="5" 
                      max="95" 
                      value={settings.guidePosition ?? 30} 
                      onChange={(e) => updateSetting('guidePosition', Number(e.target.value))}
                      className="w-20 md:w-28 accent-red-500 mx-2"
                      title="تغيير مكان المسطرة / Adjust Guide Position"
                    />
                  )}
                </div>

                <div className="flex items-center gap-2 bg-gray-900/80 backdrop-blur border border-gray-700 p-2 rounded-xl shadow-2xl text-white">
                  <button 
                    onClick={() => updateSetting('mirror', !settings.mirror)}
                    className={`p-2 rounded flex flex-col items-center gap-1 ${settings.mirror ? 'bg-blue-600' : 'hover:bg-gray-700'}`}
                    title="انعكاس أفقي / Mirror"
                  >
                    <IconRefreshCcw size={20} />
                    <span className="text-[10px]">Mirror</span>
                  </button>
                  <button 
                    onClick={() => updateSetting('flip', !settings.flip)}
                    className={`p-2 rounded flex flex-col items-center gap-1 ${settings.flip ? 'bg-blue-600' : 'hover:bg-gray-700'}`}
                    title="انعكاس رأسي / Flip"
                  >
                    <IconFlipVertical size={20} />
                    <span className="text-[10px]">Flip</span>
                  </button>
                </div>
              </div>

              {settings.showGuide && (
                <div 
                  className="fixed left-0 right-0 z-30 pointer-events-none flex items-center justify-center opacity-60 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]"
                  style={{ top: `${settings.guidePosition ?? 30}%` }}
                >
                  <div className="absolute left-0 w-0 h-0 border-t-[10px] border-t-transparent border-l-[20px] border-l-red-500 border-b-[10px] border-b-transparent"></div>
                  <div className="w-full h-[2px] bg-red-500"></div>
                  <div className="absolute right-0 w-0 h-0 border-t-[10px] border-t-transparent border-r-[20px] border-r-red-500 border-b-[10px] border-b-transparent"></div>
                </div>
              )}

              {!showControls && isMousePaused && (
                <div className="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-40 text-white/50 pointer-events-none">
                  <IconPause size={100} fill="currentColor" />
                </div>
              )}

              <div 
                ref={containerRef}
                className="w-full h-full overflow-y-auto hide-scrollbar"
                style={{ transform: transformStr }}
              >
                <div className="mx-auto" style={{ paddingTop: '100vh', paddingBottom: '100vh', width: `${settings.textWidth ?? 100}%` }}>
                  {/* تم استبدال الـ div العادي بـ textarea ليدعم التعديل المباشر */}
                  <textarea 
                    ref={textRef}
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    onFocus={() => setIsPlaying(false)} // إيقاف تلقائي للعرض بمجرد الضغط للتعديل
                    className="w-full bg-transparent resize-none focus:outline-none overflow-hidden px-4 md:px-8"
                    style={{
                      color: settings.textColor,
                      fontFamily: settings.fontFamily,
                      fontSize: `${settings.fontSize}px`,
                      lineHeight: settings.lineHeight,
                      textAlign: settings.textAlign,
                    }}
                  />
                </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
