  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(17, 24, 39, 0.9);
      --line: rgba(148, 163, 184, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #030712;
      color: #f8fafc;
      font-family: "Tajawal", "Cairo", Arial, sans-serif;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app-bg {
      background:
        radial-gradient(circle at top right, rgba(16, 185, 129, 0.18), transparent 32rem),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.16), transparent 28rem),
        linear-gradient(135deg, #020617 0%, #0b1120 42%, #030712 100%);
    }

    .thin-scrollbar::-webkit-scrollbar {
      width: 7px;
      height: 7px;
    }

    .thin-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 999px;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .folder-card {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(11, 18, 32, 0.98));
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
    }

    .folder-card::before {
      content: "";
      position: absolute;
      inset-inline-start: 18px;
      top: 14px;
      width: 44%;
      height: 23px;
      border-radius: 8px 8px 0 0;
      background: rgba(71, 85, 105, 0.46);
      z-index: -1;
    }

    .folder-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 36%);
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: -1;
    }

    .folder-card:hover::after {
      opacity: 1;
    }

    .add-folder-card {
      border: 1px dashed rgba(148, 163, 184, 0.38);
      background: rgba(15, 23, 42, 0.58);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.45), 0 16px 34px rgba(0, 0, 0, 0.18);
    }

    .add-folder-card:hover {
      border-color: rgba(34, 197, 94, 0.72);
      background: rgba(15, 23, 42, 0.82);
    }

    .modal-backdrop {
      background: rgba(2, 6, 23, 0.76);
      backdrop-filter: blur(10px);
    }

    .control-input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(2, 6, 23, 0.72);
      color: #f8fafc;
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      outline: none;
    }

    .control-input:focus {
      border-color: rgba(34, 197, 94, 0.72);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      border-radius: 8px;
      padding: 0.65rem 0.95rem;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: #16a34a;
      color: #fff;
    }

    .btn-primary:hover {
      background: #22c55e;
    }

    .btn-muted {
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
    }

    .btn-muted:hover {
      background: rgba(30, 41, 59, 0.9);
    }

    .btn-danger {
      background: rgba(220, 38, 38, 0.16);
      border: 1px solid rgba(248, 113, 113, 0.32);
      color: #fecaca;
    }

    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.28);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(15, 23, 42, 0.78);
      color: #cbd5e1;
      padding: 0.22rem 0.55rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .presence-dot {
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 999px;
      background: #64748b;
      box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.14);
    }

    .presence-dot.online {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.16);
    }
  </style>

    function normalizeEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function userIdFromEmail(email) {
      return normalizeEmail(email).replace(/[.#$\[\]/\\]/g, "_");
    }

    function isMainAdmin(email) {
      return normalizeEmail(email) === ADMIN_EMAIL;
    }

    function mergeSettings(settings) {
      return { ...DEFAULT_SETTINGS, ...(settings || {}) };
    }

    function normalizeUser(data, id) {
      const email = normalizeEmail(data?.email || id);
      const mainAdmin = isMainAdmin(email);
      const role = mainAdmin || data?.role === "admin" ? "admin" : "user";
      return {
        id,
        email,
        name: data?.name || email.split("@")[0] || "User",
        photoURL: data?.photoURL || "",
        role,
        password: data?.password || "",
        createdAt: data?.createdAt || null,
        updatedAt: data?.updatedAt || null,
        lastLoginAt: data?.lastLoginAt || null,
        isAdmin: role === "admin"
      };
    }

    function normalizeProject(data, id) {
      return {
        id,
        title: data?.title || "Untitled Folder",
        text: typeof data?.text === "string" ? data.text : DEFAULT_TEXT,
        settings: mergeSettings(data?.settings),
        ownerId: data?.ownerId || "",
        ownerEmail: data?.ownerEmail || "",
        ownerName: data?.ownerName || "",
        visibleTo: Array.isArray(data?.visibleTo) ? data.visibleTo : [],
        createdAt: data?.createdAt || null,
        updatedAt: data?.updatedAt || null,
        updatedBy: data?.updatedBy || "",
        updatedByName: data?.updatedByName || ""
      };
    }

    function formatTime(value) {
      if (!value) return "الآن";
      const date = typeof value?.toDate === "function" ? value.toDate() : new Date(value);
      if (Number.isNaN(date.getTime())) return "الآن";
      return date.toLocaleString("ar-EG", { dateStyle: "short", timeStyle: "short" });
    }

    function initials(nameOrEmail) {
      const value = String(nameOrEmail || "U").trim();
      const parts = value.split(/\s+/).filter(Boolean);
      if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
      return value.slice(0, 2).toUpperCase();
    }

    async function uploadImageToImgbb(file) {
      if (!file) return "";
      const formData = new FormData();
      formData.append("image", file);
      const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
        method: "POST",
        body: formData
      });
      const payload = await response.json();
      if (!payload?.success) {
        throw new Error(payload?.error?.message || "Image upload failed");
      }
      return payload.data.display_url || payload.data.url || payload.data.image?.url || "";
    }

    async function logActivity(actor, action, meta = {}) {
      if (!actor) return;
      await dbPush(dbRef(realtimeDb, "logs"), {
        action,
        actorId: actor.id,
        actorName: actor.name,
        actorEmail: actor.email,
        meta,
        time: realtimeTimestamp()
      });
    }

    async function notifyUser(userId, payload) {
      if (!userId) return;
      await dbPush(dbRef(realtimeDb, `notifications/${userId}`), {
        ...payload,
        read: false,
        time: realtimeTimestamp()
      });
    }

    async function notifyAdmins(users, actor, payload) {
      const admins = users.filter((user) => user.isAdmin && user.id !== actor?.id);
      await Promise.all(admins.map((admin) => notifyUser(admin.id, payload)));
    }

      const classes = size === "lg" ? "h-14 w-14 text-lg" : size === "sm" ? "h-8 w-8 text-xs" : "h-10 w-10 text-sm";

    function useFullscreen() {
      const [isFullscreen, setIsFullscreen] = useState(false);

      useEffect(() => {
        const handler = () => setIsFullscreen(Boolean(document.fullscreenElement));
        document.addEventListener("fullscreenchange", handler);
        return () => document.removeEventListener("fullscreenchange", handler);
      }, []);

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
        } else {
          document.exitFullscreen?.();
        }
      };

      return { isFullscreen, toggleFullscreen };
    }

    function usePresence(currentUser) {
      useEffect(() => {
        if (!currentUser?.id) return undefined;
        const statusRef = dbRef(realtimeDb, `presence/${currentUser.id}`);
        const connectedRef = dbRef(realtimeDb, ".info/connected");

        const unsubscribe = onValue(connectedRef, (snapshot) => {
          if (!snapshot.val()) return;
          onDisconnect(statusRef).set({
            online: false,
            lastSeen: realtimeTimestamp(),
            name: currentUser.name,
            email: currentUser.email,
            role: currentUser.role
          });
          dbSet(statusRef, {
            online: true,
            lastSeen: realtimeTimestamp(),
            name: currentUser.name,
            email: currentUser.email,
            role: currentUser.role
          });
        });

        return () => {
          unsubscribe();
          dbSet(statusRef, {
            online: false,
            lastSeen: realtimeTimestamp(),
            name: currentUser.name,
            email: currentUser.email,
            role: currentUser.role
          }).catch(() => {});
        };
      }, [currentUser?.id, currentUser?.name, currentUser?.email, currentUser?.role]);
    }

    function useNotifications(userId) {
      const [items, setItems] = useState([]);

      useEffect(() => {
        if (!userId) return undefined;
        const ref = dbRef(realtimeDb, `notifications/${userId}`);
        return onValue(ref, (snapshot) => {
          const value = snapshot.val() || {};
          const list = Object.entries(value)
            .map(([id, data]) => ({ id, ...data }))
            .sort((a, b) => (b.time || 0) - (a.time || 0));
          setItems(list);
        });
      }, [userId]);

      const markRead = useCallback((notificationId) => {
        if (!userId || !notificationId) return Promise.resolve();
        return dbUpdate(dbRef(realtimeDb, `notifications/${userId}/${notificationId}`), { read: true });
      }, [userId]);

      const markAllRead = useCallback(async () => {
        await Promise.all(items.filter((item) => !item.read).map((item) => markRead(item.id)));
      }, [items, markRead]);

      return {
        items,
        unread: items.filter((item) => !item.read).length,
        markRead,
        markAllRead
      };
    }

    function useProjectSession(projectId, currentUser, onMissing) {
      const [project, setProject] = useState(null);
      const [draft, setDraft] = useState(null);
      const [loading, setLoading] = useState(false);
      const [saveState, setSaveState] = useState("saved");
      const dirtyRef = useRef(false);
      const saveTimerRef = useRef(null);
      const pendingRef = useRef(null);
      const saveVersionRef = useRef(0);

      const flushSave = useCallback(async (payload = pendingRef.current, version = saveVersionRef.current) => {
        if (!projectId || !payload) return;
        clearTimeout(saveTimerRef.current);
        setSaveState("saving");
        await updateDoc(doc(db, "projects", projectId), {
          title: payload.title?.trim() || "Untitled Folder",
          text: payload.text || "",
          settings: mergeSettings(payload.settings),
          updatedAt: serverTimestamp(),
          updatedBy: currentUser?.id || "",
          updatedByName: currentUser?.name || ""
        });
        if (version === saveVersionRef.current) {
          dirtyRef.current = false;
          setSaveState("saved");
        }
      }, [projectId, currentUser?.id, currentUser?.name]);

      const queueSave = useCallback((nextDraft) => {
        if (!projectId || !nextDraft) return;
        pendingRef.current = nextDraft;
        dirtyRef.current = true;
        const version = saveVersionRef.current + 1;
        saveVersionRef.current = version;
        setSaveState("pending");
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => {
          flushSave(nextDraft, version).catch((error) => {
            console.error("Autosave failed", error);
            setSaveState("error");
          });
        }, 280);
      }, [projectId, flushSave]);

      const updateDraft = useCallback((updater) => {
        setDraft((prev) => {
          if (!prev) return prev;
          const next = typeof updater === "function" ? updater(prev) : { ...prev, ...updater };
          queueSave(next);
          return next;
        });
      }, [queueSave]);

      useEffect(() => {
        if (!projectId) {
          setProject(null);
          setDraft(null);
          setLoading(false);
          return undefined;
        }

        setLoading(true);
        dirtyRef.current = false;
        pendingRef.current = null;
        clearTimeout(saveTimerRef.current);

        const unsubscribe = onSnapshot(doc(db, "projects", projectId), (snapshot) => {
          if (!snapshot.exists()) {
            setProject(null);
            setDraft(null);
            setLoading(false);
            onMissing?.();
            return;
          }

          const loaded = normalizeProject(snapshot.data(), snapshot.id);
          setProject(loaded);
          if (!dirtyRef.current || loaded.updatedBy !== currentUser?.id) {
            setDraft({
              title: loaded.title,
              text: loaded.text,
              settings: mergeSettings(loaded.settings)
            });
            pendingRef.current = null;
            dirtyRef.current = false;
            setSaveState("saved");
          }
          setLoading(false);
        }, (error) => {
          console.error("Project listener failed", error);
          setLoading(false);
        });

        return () => {
          unsubscribe();
          clearTimeout(saveTimerRef.current);
          if (pendingRef.current) {
            flushSave(pendingRef.current).catch(() => {});
          }
        };
      }, [projectId, currentUser?.id, flushSave, onMissing]);

      useEffect(() => {
        const handler = () => {
          if (document.visibilityState === "hidden" && pendingRef.current) {
            flushSave(pendingRef.current).catch(() => {});
          }
        };
        const unloadHandler = () => {
          if (pendingRef.current) flushSave(pendingRef.current).catch(() => {});
        };
        document.addEventListener("visibilitychange", handler);
        window.addEventListener("beforeunload", unloadHandler);
        return () => {
          document.removeEventListener("visibilitychange", handler);
          window.removeEventListener("beforeunload", unloadHandler);
        };
      }, [flushSave]);

      return { project, draft, loading, saveState, updateDraft, flushSave };
    }

    function NotificationBell({ currentUser }) {

      return (
        <div className="relative">
          <button className="btn btn-muted !px-3" onClick={() => setOpen((value) => !value)}>
            <IconBell />
            {unread > 0 && <span className="rounded-full bg-emerald-500 px-2 py-0.5 text-xs font-black text-white">{unread}</span>}

            <div className="glass absolute left-0 top-full mt-2 w-80 rounded-lg p-3 shadow-2xl">

                <span className="font-black">الإشعارات</span>

        await onCreate(title.trim());
        setBusy(false);
      };

      return (
        <Modal title="فولدر جديد" onClose={onClose}>
          <form onSubmit={submit} className="space-y-4">
            <label className="block">
              <span className="mb-2 block text-sm font-bold text-slate-300">عنوان الفولدر</span>

    function VisibilityModal({ project, users, onClose, onSave }) {
      const [visibleTo, setVisibleTo] = useState(project.visibleTo || []);
      const [leftSelected, setLeftSelected] = useState([]);
      const [rightSelected, setRightSelected] = useState([]);
      const [busy, setBusy] = useState(false);

      const hiddenUsers = users.filter((user) => !visibleTo.includes(user.id));
      const visibleUsers = users.filter((user) => visibleTo.includes(user.id));

      const moveRight = () => {
        setVisibleTo((prev) => Array.from(new Set([...prev, ...leftSelected])));
        setLeftSelected([]);
      };

      const moveLeft = () => {
        setVisibleTo((prev) => prev.filter((id) => !rightSelected.includes(id)));
        setRightSelected([]);
      };

      const submit = async () => {
        setBusy(true);
        await onSave(visibleTo);
        setBusy(false);
      };

      return (
        <Modal title={`صلاحيات الفولدر: ${project.title}`} onClose={onClose} wide>
          <div className="grid gap-4 md:grid-cols-[1fr_auto_1fr]">
            <UserTransferList title="كل المستخدمين" users={hiddenUsers} selected={leftSelected} setSelected={setLeftSelected} />
            <div className="flex items-center justify-center gap-2 md:flex-col">
              <button className="btn btn-primary min-w-20" onClick={moveRight} disabled={leftSelected.length === 0}>إضافة</button>
              <button className="btn btn-muted min-w-20" onClick={moveLeft} disabled={rightSelected.length === 0}>إزالة</button>
            </div>
            <UserTransferList title="اللي شايفين الفولدر" users={visibleUsers} selected={rightSelected} setSelected={setRightSelected} />
          </div>
          <div className="mt-5 flex justify-end gap-3">
            <button className="btn btn-muted" onClick={onClose}>إلغاء</button>
            <button className="btn btn-primary" onClick={submit} disabled={busy}>{busy ? "جاري الحفظ..." : "حفظ الصلاحيات"}</button>
          </div>
        </Modal>
      );
    }

    function UserTransferList({ title, users, selected, setSelected }) {
      const toggle = (id) => {
        setSelected((prev) => prev.includes(id) ? prev.filter((value) => value !== id) : [...prev, id]);
      };

      return (
        <section className="rounded-lg border border-slate-700 bg-slate-950/50 p-3">
          <h3 className="mb-3 font-black">{title}</h3>
          <div className="max-h-96 space-y-2 overflow-y-auto thin-scrollbar">
            {users.length === 0 && <p className="p-4 text-center text-sm text-slate-500">لا يوجد مستخدمين.</p>}
            {users.map((user) => (
              <label key={user.id} className="flex cursor-pointer items-center gap-3 rounded-lg border border-slate-800 bg-slate-900/70 p-3 hover:border-slate-600">
                <input type="checkbox" checked={selected.includes(user.id)} onChange={() => toggle(user.id)} className="h-4 w-4 accent-emerald-500" />
                <Avatar user={user} size="sm" />
                <span className="min-w-0">
                  <span className="block truncate font-bold">{user.name}</span>
                  <span className="block truncate text-xs text-slate-400">{user.email}</span>
                </span>
              </label>
            ))}
          </div>
        </section>
      );
    }

    function useActivityLogs() {
      const [logs, setLogs] = useState([]);

      useEffect(() => {
        const ref = dbRef(realtimeDb, "logs");
        return onValue(ref, (snapshot) => {
          const value = snapshot.val() || {};
          const list = Object.entries(value)
            .map(([id, data]) => ({ id, ...data }))
            .sort((a, b) => (b.time || 0) - (a.time || 0));
          setLogs(list);
        });
      }, []);

      return logs;
    }

              <div className="flex flex-wrap items-center gap-2">

              <p className="truncate text-sm text-slate-400">{user.email}</p>

    function actionLabel(action) {
      const labels = {
        login: "تسجيل دخول",
        logout: "تسجيل خروج",
        user_created: "إنشاء حساب",
        profile_updated: "تعديل البروفايل",
        project_created: "إنشاء فولدر",
        project_deleted: "حذف فولدر",
        project_renamed: "تغيير اسم فولدر",
        project_visibility_updated: "تعديل صلاحيات فولدر",
        user_role_updated: "تغيير صلاحية مستخدم",
        user_password_cleared: "إلغاء باسورد",
        user_deleted: "حذف مستخدم"
      };
      return labels[action] || "نشاط آخر";
    }

    function logDateKey(value) {
      if (!value) return "";
      const date = typeof value?.toDate === "function" ? value.toDate() : new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function UserLogsPanel({ logs }) {
      const [actionFilter, setActionFilter] = useState("all");
      const [dateFilter, setDateFilter] = useState("");
      const [search, setSearch] = useState("");

      const actionOptions = useMemo(() => {
        return Array.from(new Set(logs.map((log) => log.action))).filter(Boolean);
      }, [logs]);

      const filteredLogs = logs.filter((log) => {
        const text = `${actionLabel(log.action)} ${logDescription(log)} ${formatLogClock(log.time)}`.toLowerCase();
        const term = search.trim().toLowerCase();
        if (actionFilter !== "all" && log.action !== actionFilter) return false;
        if (dateFilter && logDateKey(log.time) !== dateFilter) return false;
        if (term && !text.includes(term)) return false;
        return true;
      });

      return (
        <div className="mt-4 rounded-lg border border-slate-800 bg-slate-950/70 p-3">
          <div className="mb-3 grid gap-2 md:grid-cols-3">
            <input
              className="control-input !py-2"
              value={search}
              onChange={(event) => setSearch(event.target.value)}
              placeholder="ابحث في سجل المستخدم"
            />
            <select className="control-input !py-2" value={actionFilter} onChange={(event) => setActionFilter(event.target.value)}>
              <option value="all">كل الأكشنز ({logs.length})</option>
              {actionOptions.map((action) => (
                <option key={action} value={action}>{actionLabel(action)} ({logs.filter((log) => log.action === action).length})</option>
              ))}
            </select>
            <input className="control-input !py-2" type="date" value={dateFilter} onChange={(event) => setDateFilter(event.target.value)} />
          </div>

          <div className="max-h-64 space-y-2 overflow-y-auto thin-scrollbar">
            {filteredLogs.length === 0 && <p className="rounded-lg border border-slate-800 p-3 text-sm text-slate-400">لا توجد نتائج بهذا الفلتر.</p>}
            {filteredLogs.map((log) => (
              <div key={log.id} className="rounded-lg border border-slate-800 bg-slate-900/55 p-3">
                <div className="mb-1 flex flex-wrap items-center justify-between gap-2">
                  <span className="badge">{actionLabel(log.action)}</span>
                  <span className="text-xs text-slate-500">{formatLogClock(log.time)}</span>
                </div>
                <p className="text-sm font-bold text-slate-100">{logDescription(log)}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function formatLogClock(value) {
      if (!value) return "الآن";
      const date = typeof value?.toDate === "function" ? value.toDate() : new Date(value);
      if (Number.isNaN(date.getTime())) return "الآن";
      return date.toLocaleString("ar-EG", {
        day: "numeric",
        month: "short",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function roleLabel(role) {
      return role === "admin" ? "أدمن" : "عضو عادي";
    }

    function logDescription(log) {
      const actor = log.actorName || log.actorEmail || "مستخدم";
      const meta = log.meta || {};
      switch (log.action) {
        case "login":
          return `${actor} سجل دخول`;
        case "logout":
          return `${actor} سجل خروج`;
        case "user_created":
          return `${actor} أنشأ حساب جديد`;
        case "profile_updated":
          return `${actor} عدل بيانات البروفايل`;
        case "project_created":
          return `${actor} أنشأ فولدر "${meta.title || "بدون عنوان"}"`;
        case "project_deleted":
          return `${actor} حذف فولدر "${meta.title || "بدون عنوان"}"`;
        case "project_renamed":
          return `${actor} غيّر اسم فولدر من "${meta.oldTitle || "بدون عنوان"}" إلى "${meta.title || "بدون عنوان"}"`;
        case "project_visibility_updated":
          return `${actor} عدّل صلاحيات فولدر "${meta.title || "بدون عنوان"}"`;
        case "user_role_updated":
          return `${actor} غيّر صلاحية ${meta.email || "مستخدم"} إلى ${roleLabel(meta.role)}`;
        case "user_password_cleared":
          return `${actor} ألغى باسورد ${meta.email || "مستخدم"}`;
        case "user_deleted":

    function PrompterScreenModern({ session, onExit, isFullscreen, toggleFullscreen }) {
      const { draft, updateDraft } = session;
      const containerRef = useRef(null);
      const textRef = useRef(null);
      const requestRef = useRef(null);
      const controlsTimeoutRef = useRef(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isMousePaused, setIsMousePaused] = useState(false);
      const [showControls, setShowControls] = useState(true);
      const isPlayingRef = useRef(false);
      const isMousePausedRef = useRef(false);
      const speedRef = useRef(DEFAULT_SETTINGS.speed);
      const speedMultiplierRef = useRef(1);
      const accumulateRef = useRef(0);

      const settings = mergeSettings(draft?.settings);

      useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
      useEffect(() => { isMousePausedRef.current = isMousePaused; }, [isMousePaused]);
      useEffect(() => { speedRef.current = settings.speed; }, [settings.speed]);

      const setText = (value) => updateDraft((prev) => ({ ...prev, text: value }));
      const updateSetting = (key, value) => updateDraft((prev) => ({ ...prev, settings: { ...mergeSettings(prev.settings), [key]: value } }));

      useLayoutEffect(() => {
        if (!textRef.current) return;
        const container = containerRef.current;
        const prevScrollTop = container ? container.scrollTop : 0;
        textRef.current.style.height = "0px";
        textRef.current.style.height = `${textRef.current.scrollHeight}px`;
        if (container) container.scrollTop = prevScrollTop;
      }, [draft?.text, settings.fontSize, settings.lineHeight, settings.textWidth, settings.fontFamily]);

      useEffect(() => {
        if (isPlaying) {
          setShowControls(false);
        } else {
          setShowControls(true);
          clearTimeout(controlsTimeoutRef.current);
        }
      }, [isPlaying]);

      const animate = useCallback(() => {
        if (isPlayingRef.current && !isMousePausedRef.current && containerRef.current) {
          const scrollAmount = (speedRef.current / 15) * speedMultiplierRef.current;
          accumulateRef.current += scrollAmount;
          if (accumulateRef.current >= 1) {
            const pixels = Math.floor(accumulateRef.current);
            containerRef.current.scrollTop += pixels;
            accumulateRef.current -= pixels;
          }
        }
        requestRef.current = requestAnimationFrame(animate);
      }, []);

      useEffect(() => {
        requestRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(requestRef.current);
      }, [animate]);

      useEffect(() => {
        const handleKeyDown = (event) => {
          if (event.target.tagName === "INPUT" || event.target.tagName === "TEXTAREA") return;
          if (["Space", " ", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) event.preventDefault();
          if (!containerRef.current) return;

          switch (event.key) {
            case "Space":
            case " ":
              setIsPlaying((prev) => !prev);
              break;
            case "ArrowUp":
              containerRef.current.scrollTop -= 100;
              accumulateRef.current = 0;
              break;
            case "ArrowRight":
              containerRef.current.scrollTop -= 350;
              accumulateRef.current = 0;
              break;
            case "ArrowDown":
              speedMultiplierRef.current = 4;
              break;
            case "ArrowLeft":
              speedMultiplierRef.current = 10;
              break;
            default:
              break;
          }
        };

        const handleKeyUp = (event) => {
          if (["ArrowDown", "ArrowLeft"].includes(event.key)) speedMultiplierRef.current = 1;
        };

        window.addEventListener("keydown", handleKeyDown);
        window.addEventListener("keyup", handleKeyUp);
        return () => {
          window.removeEventListener("keydown", handleKeyDown);
          window.removeEventListener("keyup", handleKeyUp);
        };
      }, []);

      const handleMouseMove = () => {
        if (isMousePausedRef.current) return;
        setShowControls(true);
        if (isPlayingRef.current) {
          clearTimeout(controlsTimeoutRef.current);
          controlsTimeoutRef.current = setTimeout(() => {
            if (isPlayingRef.current) setShowControls(false);
          }, 1300);
        }
      };

      let transform = "";
      if (settings.mirror) transform += "scaleX(-1) ";
      if (settings.flip) transform += "scaleY(-1) ";

      return (
        <div
          className="fixed inset-0 overflow-hidden"
          style={{ backgroundColor: settings.bgColor }}
          onMouseMove={handleMouseMove}
          onMouseDown={(event) => { if (!event.target.closest(".controls-bar") && event.target.tagName !== "TEXTAREA") setIsMousePaused(true); }}
          onMouseUp={() => setIsMousePaused(false)}
          onMouseLeave={() => setIsMousePaused(false)}
          onTouchStart={(event) => { if (!event.target.closest(".controls-bar")) setIsMousePaused(true); }}
          onTouchEnd={() => setIsMousePaused(false)}
        >
          <div className={`controls-bar fixed left-0 right-0 top-0 z-50 flex flex-wrap items-center justify-center gap-3 p-4 transition-all duration-300 ${showControls ? "translate-y-0 opacity-100" : "-translate-y-full opacity-0"}`}>
            <div className="flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-950/84 p-2 shadow-2xl backdrop-blur">
              <button className="btn btn-muted !p-2" onClick={onExit}><IconSettings /></button>
              <button className="btn btn-muted !p-2" onClick={toggleFullscreen}>{isFullscreen ? <IconMinimize /> : <IconMaximize />}</button>
              <button className={`btn !p-3 ${isPlaying ? "btn-danger" : "btn-primary"}`} onClick={() => setIsPlaying((prev) => !prev)}>
                {isPlaying ? <IconPause fill="currentColor" /> : <IconPlay fill="currentColor" />}
              </button>
            </div>

            <div className="flex items-center gap-3 rounded-lg border border-slate-700 bg-slate-950/84 p-3 shadow-2xl backdrop-blur">
              <span className="text-sm font-bold">Speed</span>
              <input type="range" min="1" max="100" value={settings.speed} onChange={(event) => updateSetting("speed", Number(event.target.value))} className="w-44 accent-emerald-500" />
              <input type="number" min="1" max="100" value={settings.speed} onChange={(event) => updateSetting("speed", Number(event.target.value))} className="w-16 rounded-lg border border-slate-700 bg-slate-900 p-2 text-center outline-none" />
            </div>

            <div className="flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-950/84 p-2 shadow-2xl backdrop-blur">
              <button className={`btn !py-2 ${settings.showGuide ? "btn-primary" : "btn-muted"}`} onClick={() => updateSetting("showGuide", !settings.showGuide)}>Guide</button>
              {settings.showGuide && <input type="range" min="5" max="95" value={settings.guidePosition} onChange={(event) => updateSetting("guidePosition", Number(event.target.value))} className="w-28 accent-red-500" />}
              <button className={`btn !py-2 ${settings.mirror ? "btn-primary" : "btn-muted"}`} onClick={() => updateSetting("mirror", !settings.mirror)}>Mirror</button>
              <button className={`btn !py-2 ${settings.flip ? "btn-primary" : "btn-muted"}`} onClick={() => updateSetting("flip", !settings.flip)}>Flip</button>
            </div>
          </div>

          {settings.showGuide && (
            <div className="pointer-events-none fixed left-0 right-0 z-30 opacity-70" style={{ top: `${settings.guidePosition}%` }}>
              <div className="h-[2px] w-full bg-red-500 shadow-[0_0_16px_rgba(239,68,68,0.9)]"></div>
            </div>
          )}

          {!showControls && isMousePaused && (
            <div className="pointer-events-none fixed left-1/2 top-1/2 z-40 -translate-x-1/2 -translate-y-1/2 text-white/40">
              <IconPause size={96} fill="currentColor" />
            </div>
          )}

          <div ref={containerRef} className="h-full w-full overflow-y-auto hide-scrollbar" style={{ transform }}>
            <div className="mx-auto" style={{ paddingTop: "100vh", paddingBottom: "100vh", width: `${settings.textWidth}%` }}>
              <textarea
                ref={textRef}
                value={draft?.text || ""}
                onChange={(event) => setText(event.target.value)}
                onFocus={() => setIsPlaying(false)}
                className="w-full resize-none overflow-hidden bg-transparent px-4 outline-none md:px-8"
                style={{
                  color: settings.textColor,
                  fontFamily: settings.fontFamily,
                  fontSize: `${settings.fontSize}px`,
                  lineHeight: settings.lineHeight,
                  textAlign: settings.textAlign
                }}
              />
            </div>
          </div>
        </div>
      );
    }

    function ChatDock({ currentUser, users, presence }) {
      const [open, setOpen] = useState(false);
      const [minimized, setMinimized] = useState(false);
      const [search, setSearch] = useState("");
      const [activeUserId, setActiveUserId] = useState("");
      const [messages, setMessages] = useState([]);
      const [text, setText] = useState("");
      const { items, markRead } = useNotifications(currentUser.id);
      const chatUnread = items.filter((item) => item.type === "chat" && !item.read).length;

      const contacts = useMemo(() => {
        const allowed = currentUser.isAdmin
          ? users.filter((user) => user.id !== currentUser.id)
          : users.filter((user) => user.id !== currentUser.id && user.isAdmin);
        const term = search.trim().toLowerCase();
        return allowed.filter((user) => `${user.name} ${user.email}`.toLowerCase().includes(term));
      }, [users, currentUser, search]);

      useEffect(() => {
        if (!activeUserId && contacts.length > 0) setActiveUserId(contacts[0].id);
      }, [contacts, activeUserId]);

      const activeUser = contacts.find((user) => user.id === activeUserId) || users.find((user) => user.id === activeUserId);
      const chatId = activeUser ? [currentUser.id, activeUser.id].sort().join("__") : "";

      useEffect(() => {
        if (!chatId) {
          setMessages([]);
          return undefined;
        }
        const ref = dbRef(realtimeDb, `chats/${chatId}/messages`);
        return onValue(ref, (snapshot) => {
          const value = snapshot.val() || {};
          const list = Object.entries(value)
            .map(([id, data]) => ({ id, ...data }))
            .sort((a, b) => (a.time || 0) - (b.time || 0));
          setMessages(list);
        });
      }, [chatId]);

      useEffect(() => {
        if (!chatId || !open) return;
        items
          .filter((item) => !item.read && item.chatId === chatId)
          .forEach((item) => markRead(item.id));
      }, [items, chatId, open, markRead]);

      const send = async (event) => {
        event.preventDefault();
        const clean = text.trim();
        if (!clean || !activeUser) return;
        setText("");
        const message = {
          from: currentUser.id,
          fromName: currentUser.name,
          to: activeUser.id,
          text: clean,
          time: realtimeTimestamp()
        };
        await dbPush(dbRef(realtimeDb, `chats/${chatId}/messages`), message);
        await notifyUser(activeUser.id, {
          type: "chat",
          chatId,
          from: currentUser.id,
          title: `رسالة من ${currentUser.name}`,
          body: clean.slice(0, 120)

          </button>
        );

      return (
        <aside className={`fixed bottom-4 right-4 z-50 w-[min(760px,calc(100vw-2rem))] overflow-hidden rounded-lg border border-slate-700 bg-slate-950 shadow-2xl ${minimized ? "h-14" : "h-[520px]"}`}>
          <div className="flex h-14 items-center justify-between border-b border-slate-800 px-3">
            <div className="flex items-center gap-2 font-black"><IconMessage /> الشات</div>
            <div className="flex gap-2">
              <button className="btn btn-muted !h-10 !w-10 !px-0 !py-0 text-xl" title={minimized ? "+" : "-"} onClick={() => setMinimized((value) => !value)}>{minimized ? "+" : "-"}</button>
              <button className="btn btn-muted !px-2 !py-1" onClick={() => setOpen(false)}><IconClose /></button>
            </div>
          </div>

          {!minimized && (
            <div className="grid h-[466px] grid-cols-[260px_1fr]">
              <div className="border-l border-slate-800 p-3">
                <input className="control-input mb-3 !py-2" value={search} onChange={(event) => setSearch(event.target.value)} placeholder="ابحث عن مستخدم" />
                <div className="h-[390px] space-y-2 overflow-y-auto thin-scrollbar">
                  {contacts.length === 0 && <p className="p-3 text-center text-sm text-slate-500">لا يوجد مستخدمين متاحين للشات.</p>}
                  {contacts.map((user) => (
                    <button key={user.id} className={`flex w-full items-center gap-3 rounded-lg border p-2 text-right ${activeUserId === user.id ? "border-emerald-500 bg-emerald-500/10" : "border-slate-800 bg-slate-900/60"}`} onClick={() => setActiveUserId(user.id)}>
                      <Avatar user={user} size="sm" />
                      <span className="min-w-0 flex-1">
                        <span className="block truncate font-bold">{user.name}</span>
                        <span className="flex items-center gap-2 text-xs text-slate-400"><span className={`presence-dot ${presence[user.id]?.online ? "online" : ""}`}></span>{presence[user.id]?.online ? "متصل" : "غير متصل"}</span>
                      </span>
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex min-w-0 flex-col">
                {activeUser ? (
                  <>
                    <div className="flex items-center gap-3 border-b border-slate-800 p-3">
                      <Avatar user={activeUser} size="sm" />
                      <div>
                        <div className="font-black">{activeUser.name}</div>

                    <div className="flex-1 space-y-2 overflow-y-auto p-3 thin-scrollbar">
                      {messages.map((message) => {

    function PrompterScreen({ session, onExit, isFullscreen, toggleFullscreen }) {
      const { draft, updateDraft } = session;
      const containerRef = useRef(null);
      const textRef = useRef(null);
      const requestRef = useRef(null);

      const [isPlaying, setIsPlaying] = useState(false);
      const [isMousePaused, setIsMousePaused] = useState(false);
      const [showControls, setShowControls] = useState(true);

      const isPlayingRef = useRef(isPlaying);
      const isMousePausedRef = useRef(isMousePaused);
      const speedRef = useRef(DEFAULT_SETTINGS.speed);
      const speedMultiplierRef = useRef(1);
      const accumulateRef = useRef(0);
      const controlsTimeoutRef = useRef(null);

      const settings = mergeSettings(draft?.settings);

      const setText = (value) => updateDraft({ text: value });
      const updateSetting = (key, value) => {
        updateDraft((prev) => ({
          ...prev,
          settings: { ...mergeSettings(prev.settings), [key]: value }
        }));
      };

      useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
      useEffect(() => { isMousePausedRef.current = isMousePaused; }, [isMousePaused]);
      useEffect(() => { speedRef.current = settings.speed; }, [settings.speed]);

      useLayoutEffect(() => {
        if (textRef.current) {
          const container = containerRef.current;
          const prevScrollTop = container ? container.scrollTop : 0;

          textRef.current.style.height = "0px";
          textRef.current.style.height = `${textRef.current.scrollHeight}px`;

          if (container) {
            container.scrollTop = prevScrollTop;
          }
        }
      }, [draft?.text, settings.fontSize, settings.lineHeight, settings.textWidth, settings.fontFamily]);

      useEffect(() => {
        if (isPlaying) {
          setShowControls(false);
        } else {
          setShowControls(true);
          clearTimeout(controlsTimeoutRef.current);
        }
      }, [isPlaying]);

      const handleMouseMove = () => {
        if (isMousePausedRef.current) return;

        setShowControls(true);
        if (isPlayingRef.current) {
          clearTimeout(controlsTimeoutRef.current);
          controlsTimeoutRef.current = setTimeout(() => {
            if (isPlayingRef.current) setShowControls(false);
          }, 1500);
        }
      };

      const animate = useCallback(() => {
        if (isPlayingRef.current && !isMousePausedRef.current && containerRef.current) {
          const scrollAmount = (speedRef.current / 15) * speedMultiplierRef.current;

          accumulateRef.current += scrollAmount;

          if (accumulateRef.current >= 1) {
            const pixels = Math.floor(accumulateRef.current);
            containerRef.current.scrollTop += pixels;
            accumulateRef.current -= pixels;
          }
        }
        requestRef.current = requestAnimationFrame(animate);
      }, []);

      useEffect(() => {
        requestRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(requestRef.current);
      }, [animate]);

      useEffect(() => {
        const handleKeyDown = (event) => {
          if (event.key === "Escape") {
            if (document.activeElement && document.activeElement.tagName === "TEXTAREA") {
              document.activeElement.blur();
            }
            return;
          }

          if (event.target.tagName === "INPUT" || event.target.tagName === "TEXTAREA") return;

          if (["Space", " ", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
            event.preventDefault();
          }

          if (!containerRef.current) return;

          switch (event.key) {
            case "Space":
            case " ":
              setIsPlaying((prev) => !prev);
              break;
            case "ArrowUp":
              containerRef.current.scrollTop -= 100;
              accumulateRef.current = 0;
              break;
            case "ArrowRight":
              containerRef.current.scrollTop -= 350;
              accumulateRef.current = 0;
              break;
            case "ArrowDown":
              speedMultiplierRef.current = 4;
              break;
            case "ArrowLeft":
              speedMultiplierRef.current = 10;
              break;
            default:
              break;
          }
        };

        const handleKeyUp = (event) => {
          if (["ArrowDown", "ArrowLeft"].includes(event.key)) {
            speedMultiplierRef.current = 1;
          }
        };

        window.addEventListener("keydown", handleKeyDown);
        window.addEventListener("keyup", handleKeyUp);
        return () => {
          window.removeEventListener("keydown", handleKeyDown);
          window.removeEventListener("keyup", handleKeyUp);
        };
      }, []);

      const handleMouseDown = (event) => {
        if (event.target.closest(".controls-bar") || event.target.tagName === "TEXTAREA") return;
        setIsMousePaused(true);
      };

      const handleMouseUp = () => {
        setIsMousePaused(false);
      };

      if (!draft) {
        return <LoadingScreen />;
      }

      let transformStr = "";
      if (settings.mirror) transformStr += "scaleX(-1) ";
      if (settings.flip) transformStr += "scaleY(-1) ";

      return (
        <div
          className="fixed inset-0 overflow-hidden"
          style={{ backgroundColor: settings.bgColor }}
          onMouseMove={handleMouseMove}
          onMouseDown={handleMouseDown}
          onMouseUp={handleMouseUp}
          onMouseLeave={handleMouseUp}
          onTouchStart={handleMouseDown}
          onTouchEnd={handleMouseUp}
        >

          <div
            className={`controls-bar fixed top-0 left-0 right-0 p-4 flex flex-wrap justify-center md:justify-between items-center gap-4 z-50 transition-all duration-500 ${showControls ? "opacity-100 translate-y-0" : "opacity-0 -translate-y-full"}`}
          >
            <div className="flex items-center gap-3 bg-gray-900/80 backdrop-blur border border-gray-700 p-2 rounded-xl shadow-2xl text-white">
              <button
                onClick={onExit}
                className="p-2 hover:bg-gray-700 rounded text-gray-300 hover:text-white"
                title="رجوع / Exit"
              >
                <IconSettings size={24} />
              </button>
              <div className="w-px h-8 bg-gray-600"></div>
              <button
                onClick={toggleFullscreen}
                className="p-2 hover:bg-gray-700 rounded text-gray-300 hover:text-white"
                title="ملء الشاشة / Fullscreen"
              >
                {isFullscreen ? <IconMinimize size={24} /> : <IconMaximize size={24} />}
              </button>
              <div className="w-px h-8 bg-gray-600"></div>
              <button
                onClick={() => setIsPlaying(!isPlaying)}
                className={`p-3 rounded-lg flex items-center gap-2 ${isPlaying ? "bg-red-500/20 text-red-500 hover:bg-red-500/30" : "bg-green-500/20 text-green-500 hover:bg-green-500/30"}`}
              >
                {isPlaying ? <IconPause fill="currentColor" /> : <IconPlay fill="currentColor" />}
              </button>
            </div>

            <div className="flex items-center gap-4 bg-gray-900/80 backdrop-blur border border-gray-700 p-3 rounded-xl shadow-2xl text-white">
              <span className="text-sm font-bold text-gray-300">السرعة / Speed</span>
              <input
                type="range"
                min="1"
                max="100"
                value={settings.speed}
                onChange={(event) => updateSetting("speed", Number(event.target.value))}
                className="w-32 md:w-48 accent-blue-500"
              />
              <input
                type="number"
                min="1"
                max="100"
                value={settings.speed}
                onChange={(event) => updateSetting("speed", Number(event.target.value))}
                className="w-16 bg-gray-800 text-center rounded border border-gray-600 p-1 focus:outline-none focus:border-blue-500"
              />
            </div>

            <div className="flex items-center gap-2 bg-gray-900/80 backdrop-blur border border-gray-700 p-2 rounded-xl shadow-2xl text-white">
              <button
                onClick={() => updateSetting("showGuide", !settings.showGuide)}
                className={`p-2 rounded flex flex-col items-center gap-1 ${settings.showGuide ? "bg-red-600" : "hover:bg-gray-700"}`}
                title="مسطرة القراءة / Reading Guide"
              >
                <IconCrosshair size={20} />
                <span className="text-[10px]">Guide</span>
              </button>
              {settings.showGuide && (
                <input
                  type="range"
                  min="5"
                  max="95"
                  value={settings.guidePosition ?? 30}
                  onChange={(event) => updateSetting("guidePosition", Number(event.target.value))}
                  className="w-20 md:w-28 accent-red-500 mx-2"
                  title="تغيير مكان المسطرة / Adjust Guide Position"
                />
              )}
            </div>

            <div className="flex items-center gap-2 bg-gray-900/80 backdrop-blur border border-gray-700 p-2 rounded-xl shadow-2xl text-white">
              <button
                onClick={() => updateSetting("mirror", !settings.mirror)}
                className={`p-2 rounded flex flex-col items-center gap-1 ${settings.mirror ? "bg-blue-600" : "hover:bg-gray-700"}`}
                title="انعكاس أفقي / Mirror"
              >
                <IconRefreshCcw size={20} />
                <span className="text-[10px]">Mirror</span>
              </button>
              <button
                onClick={() => updateSetting("flip", !settings.flip)}
                className={`p-2 rounded flex flex-col items-center gap-1 ${settings.flip ? "bg-blue-600" : "hover:bg-gray-700"}`}
                title="انعكاس رأسي / Flip"
              >
                <IconFlipVertical size={20} />
                <span className="text-[10px]">Flip</span>
              </button>
            </div>
          </div>

          {settings.showGuide && (
            <div
              className="fixed left-0 right-0 z-30 pointer-events-none flex items-center justify-center opacity-60 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]"
              style={{ top: `${settings.guidePosition ?? 30}%` }}
            >
              <div className="absolute left-0 w-0 h-0 border-t-[10px] border-t-transparent border-l-[20px] border-l-red-500 border-b-[10px] border-b-transparent"></div>
              <div className="w-full h-[2px] bg-red-500"></div>
              <div className="absolute right-0 w-0 h-0 border-t-[10px] border-t-transparent border-r-[20px] border-r-red-500 border-b-[10px] border-b-transparent"></div>
            </div>
          )}

          {!showControls && isMousePaused && (
            <div className="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-40 text-white/50 pointer-events-none">
              <IconPause size={100} fill="currentColor" />
            </div>
          )}

          <div
            ref={containerRef}
            className="w-full h-full overflow-y-auto hide-scrollbar"
            style={{ transform: transformStr }}
          >
            <div className="mx-auto" style={{ paddingTop: "100vh", paddingBottom: "100vh", width: `${settings.textWidth ?? 100}%` }}>
              <textarea
                ref={textRef}
                value={draft.text || ""}
                onChange={(event) => setText(event.target.value)}
                onFocus={() => setIsPlaying(false)}
                className="w-full bg-transparent resize-none focus:outline-none overflow-hidden px-4 md:px-8"
                style={{
                  color: settings.textColor,
                  fontFamily: settings.fontFamily,
                  fontSize: `${settings.fontSize}px`,
                  lineHeight: settings.lineHeight,
                  textAlign: settings.textAlign
                }}
              />
            </div>
          </div>

        </div>
      );
    }

    function App() {
      const [booting, setBooting] = useState(true);
      const [currentUser, setCurrentUser] = useState(null);
      const [users, setUsers] = useState([]);
      const [projects, setProjects] = useState([]);
      const [presence, setPresence] = useState({});
      const [stage, setStage] = useState("dashboard");
      const [selectedProjectId, setSelectedProjectId] = useState("");
      const [profileOpen, setProfileOpen] = useState(false);
      const [appMessage, setAppMessage] = useState(null);
      const { isFullscreen, toggleFullscreen } = useFullscreen();

      const onMissingProject = useCallback(() => {
        setSelectedProjectId("");
        setStage("dashboard");
      }, []);

      const session = useProjectSession(selectedProjectId, currentUser, onMissingProject);
      usePresence(currentUser);

      useEffect(() => {
        const restore = async () => {
          const savedEmail = normalizeEmail(localStorage.getItem(SESSION_KEY));
          if (!savedEmail) {
            setBooting(false);
            return;
          }

          try {
            const id = userIdFromEmail(savedEmail);
            const snapshot = await getDoc(doc(db, "users", id));
            if (!snapshot.exists()) {
              localStorage.removeItem(SESSION_KEY);
              setBooting(false);
              return;
            }

            const user = normalizeUser(snapshot.data(), id);
            setCurrentUser(user);
            await updateDoc(doc(db, "users", id), {
              role: isMainAdmin(user.email) ? "admin" : user.role,
              lastLoginAt: serverTimestamp()
            }).catch(() => {});
          } catch (err) {
            console.error(err);
            localStorage.removeItem(SESSION_KEY);
          } finally {
            setBooting(false);
          }
        };
        restore();
      }, []);

      useEffect(() => {
        if (!currentUser?.id) return undefined;
        return onSnapshot(doc(db, "users", currentUser.id), (snapshot) => {
          if (!snapshot.exists()) {
            localStorage.removeItem(SESSION_KEY);
            setCurrentUser(null);
            setStage("dashboard");
            return;
          }
          const updated = normalizeUser(snapshot.data(), currentUser.id);
          setCurrentUser(updated);
        });
      }, [currentUser?.id]);

      useEffect(() => {
        if (!currentUser?.id) return undefined;
        return onSnapshot(collection(db, "users"), (snapshot) => {
          setUsers(snapshot.docs.map((item) => normalizeUser(item.data(), item.id)).sort((a, b) => a.name.localeCompare(b.name, "ar")));
        }, (error) => console.error("Users listener failed", error));
      }, [currentUser?.id]);

      useEffect(() => {
        if (!currentUser?.id) return undefined;
        return onSnapshot(collection(db, "projects"), (snapshot) => {
          setProjects(snapshot.docs.map((item) => normalizeProject(item.data(), item.id)));
        }, (error) => console.error("Projects listener failed", error));
      }, [currentUser?.id]);

      useEffect(() => {
        if (!currentUser?.id) return undefined;
        return onValue(dbRef(realtimeDb, "presence"), (snapshot) => {
          setPresence(snapshot.val() || {});
        });
      }, [currentUser?.id]);

      const handleLogout = () => {
        if (currentUser?.id) {
          dbSet(dbRef(realtimeDb, `presence/${currentUser.id}`), {
            online: false,
            lastSeen: realtimeTimestamp(),
            name: currentUser.name,
            email: currentUser.email,
            role: currentUser.role
          }).catch(() => {});
          logActivity(currentUser, "logout", {}).catch(() => {});
        }
        localStorage.removeItem(SESSION_KEY);
        setCurrentUser(null);
        setSelectedProjectId("");
        setStage("dashboard");
      };

      const handleCreateProject = async (title) => {
        const payload = {
          title,
          text: DEFAULT_TEXT,
          settings: { ...DEFAULT_SETTINGS, textAlign: "right" },
          ownerId: currentUser.id,
          ownerEmail: currentUser.email,
          ownerName: currentUser.name,
          visibleTo: [currentUser.id],
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          updatedBy: currentUser.id,
          updatedByName: currentUser.name
        };
        const ref = await addDoc(collection(db, "projects"), payload);
        await logActivity(currentUser, "project_created", { projectId: ref.id, title });
        await notifyAdmins(users, currentUser, {
          type: "log",
          title: "فولدر جديد",
          body: `${currentUser.name} أنشأ فولدر: ${title}`
        });
        setSelectedProjectId(ref.id);
        setStage("editor");
      };

      const handleOpenProject = (project) => {
        if (!currentUser.isAdmin && !project.visibleTo.includes(currentUser.id)) {
          setAppMessage({
            title: "غير متاح",
            message: "الفولدر غير متاح لهذا المستخدم."
          });
          return;
        }
        setSelectedProjectId(project.id);
        setStage("editor");
      };

      const handleDeleteProject = async (project) => {
        const canDelete = currentUser.isAdmin || project.ownerId === currentUser.id;
        if (!canDelete) return;
        await deleteDoc(doc(db, "projects", project.id));
        await logActivity(currentUser, "project_deleted", { projectId: project.id, title: project.title });
      };

      const handleRenameProject = async (project, nextTitle) => {
        if (!currentUser.isAdmin && project.ownerId !== currentUser.id) return;
        if (!nextTitle || !nextTitle.trim() || nextTitle.trim() === project.title) return;
        await updateDoc(doc(db, "projects", project.id), {
          title: nextTitle.trim(),
          updatedAt: serverTimestamp(),
          updatedBy: currentUser.id,
          updatedByName: currentUser.name
        });
        await logActivity(currentUser, "project_renamed", {
          title: nextTitle.trim(),
          oldTitle: project.title
        });
      };

      const handleUpdateVisibility = async (project, visibleTo) => {
        await updateDoc(doc(db, "projects", project.id), {
          visibleTo,
          updatedAt: serverTimestamp(),
          updatedBy: currentUser.id,
          updatedByName: currentUser.name
        });
        await logActivity(currentUser, "project_visibility_updated", {
          projectId: project.id,
          title: project.title,
          visibleTo
        });
      };

      const handleUpdateRole = async (user, role) => {
        if (isMainAdmin(user.email) && role !== "admin") return;
        await updateDoc(doc(db, "users", user.id), {
          role,
          updatedAt: serverTimestamp()
        });
        await logActivity(currentUser, "user_role_updated", { userId: user.id, email: user.email, role });
        await notifyUser(user.id, {
          type: "role",
          title: "تم تغيير صلاحيتك",
          body: role === "admin" ? "حسابك أصبح أدمن." : "حسابك أصبح عضو عادي."
        });
      };

      const handleClearUserPassword = async (user) => {
        await updateDoc(doc(db, "users", user.id), {
          password: "",
          updatedAt: serverTimestamp()
        });
        await logActivity(currentUser, "user_password_cleared", { userId: user.id, email: user.email });
      };

      const handleDeleteUser = async (user) => {
        if (isMainAdmin(user.email)) return;
        const batch = writeBatch(db);
        batch.delete(doc(db, "users", user.id));
        projects.forEach((project) => {
          if (project.visibleTo.includes(user.id)) {
            batch.update(doc(db, "projects", project.id), {
              visibleTo: project.visibleTo.filter((id) => id !== user.id),
              updatedAt: serverTimestamp()
            });
          }
        });
        await batch.commit();
        await logActivity(currentUser, "user_deleted", { userId: user.id, email: user.email });
      };

      if (booting) return <LoadingScreen />;

      if (!currentUser) {
        return <LoginScreen onLogin={setCurrentUser} />;
      }

      const showChat = stage !== "prompter";

      return (
        <>
          {stage === "dashboard" && (
            <Dashboard
              currentUser={currentUser}
              users={users}
              projects={projects}
              presence={presence}
              onCreateProject={handleCreateProject}
              onOpenProject={handleOpenProject}
              onDeleteProject={handleDeleteProject}
              onRenameProject={handleRenameProject}
              onLogout={handleLogout}
              onEditProfile={() => setProfileOpen(true)}
              onUpdateRole={handleUpdateRole}
              onDeleteUser={handleDeleteUser}
              onClearUserPassword={handleClearUserPassword}
              onUpdateVisibility={handleUpdateVisibility}
            />
          )}

          {stage === "editor" && (
            <ProjectEditor
              session={session}
              currentUser={currentUser}
              onBack={() => { setStage("dashboard"); setSelectedProjectId(""); }}
              onPlay={() => setStage("prompter")}
              isFullscreen={isFullscreen}
              toggleFullscreen={toggleFullscreen}
            />
          )}

          {stage === "prompter" && (
            <PrompterScreen
              session={session}
              onExit={() => setStage("editor")}
              isFullscreen={isFullscreen}
              toggleFullscreen={toggleFullscreen}
            />
          )}

          {profileOpen && <ProfileModal currentUser={currentUser} onClose={() => setProfileOpen(false)} onPasswordChanged={handleLogout} />}
          {appMessage && <InfoModal title={appMessage.title} message={appMessage.message} onClose={() => setAppMessage(null)} />}
          {showChat && <ChatDock currentUser={currentUser} users={users} presence={presence} />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
